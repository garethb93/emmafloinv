<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmmaFloAir Invoice Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @media (max-width: 768px) {
            .responsive-table thead { display: none; }
            .responsive-table tr { display: block; margin-bottom: 1rem; border: 1px solid #e5e7eb; padding: 1rem; border-radius: 8px; }
            .responsive-table td { display: flex; justify-content: space-between; padding: 0.4rem 0; border-bottom: 1px solid #f3f4f6; }
            .responsive-table td::before { content: attr(data-label); font-weight: 800; font-size: 10px; color: #9ca3af; }
        }
        /* PDF specific overrides */
        .force-pdf-layout .no-print { display: none !important; }
        .force-pdf-layout thead { display: table-header-group !important; border-bottom: 2px solid black !important; }
        .force-pdf-layout tr { display: table-row !important; }
        .force-pdf-layout td { display: table-cell !important; padding: 8px 4px !important; border-bottom: 1px solid #eee !important; vertical-align: top; }
        .force-pdf-layout td::before { display: none !important; }
        
        .col-date { width: 100px; }
        .col-desc { width: auto; }
        .col-small { width: 60px; text-align: right; }
        .col-total { width: 100px; text-align: right; }
        .doc-subtitle { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #1f2937; }
        .pdf-text-fix { white-space: pre-wrap; font-size: 14px; color: #374151; }
        .pdf-hidden-row { display: none !important; }
        #customer-memories { z-index: 9999 !important; background: white; border: 1px solid #e5e7eb; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .notes-container { min-height: 80px; margin-bottom: 20px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="auth-overlay" class="fixed inset-0 bg-white flex items-center justify-center z-[100]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4 text-center border border-gray-100">
            <img src="image_1.png" alt="Logo" class="w-24 h-24 mx-auto mb-6 object-contain">
            <h2 class="text-2xl font-black uppercase text-gray-900 mb-8">Staff Login</h2>
            <div class="space-y-4 text-left">
                <input type="email" id="email" placeholder="Email" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                <input type="password" id="password" placeholder="Password" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl outline-none">
                <button onclick="handleLogin()" class="w-full bg-black text-white py-4 rounded-xl font-bold mt-4">Sign In</button>
            </div>
        </div>
    </div>

    <div class="container mx-auto p-2 md:p-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 no-print">
                <div class="bg-white p-6 rounded-xl border border-gray-200 lg:sticky lg:top-8">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-md font-bold uppercase">History</h2>
                        <button onclick="createNew()" class="text-xs bg-blue-100 text-blue-700 px-2 py-1 rounded">New Invoice</button>
                    </div>
                    <div id="saved-list" class="space-y-2"></div>
                </div>
            </div>

            <div class="lg:col-span-3 bg-white p-6 md:p-16 rounded-xl shadow-lg border border-gray-200" id="printable-area">
                <div class="flex justify-between items-start mb-12">
                    <div class="flex items-center space-x-6">
                        <img src="image_1.png" alt="Logo" class="w-32 h-32 object-contain">
                        <div>
                            <h1 class="text-4xl font-black uppercase text-gray-900">Invoice</h1>
                            <p id="invoiceNumberDisplay" class="text-lg font-bold text-gray-400 mt-1">#------</p>
                            <input type="date" id="invoiceDate" class="block border-none p-0 text-gray-900 font-bold focus:ring-0 bg-transparent text-lg mt-2">
                        </div>
                    </div>
                    <div class="no-print flex space-x-2">
                        <button onclick="saveInvoice()" class="bg-emerald-600 text-white px-6 py-2 rounded-lg font-bold">Save</button>
                        <button onclick="downloadPDF()" class="bg-black text-white px-6 py-2 rounded-lg font-bold">PDF</button>
                    </div>
                </div>

                <div class="flex flex-col md:flex-row justify-between gap-10 mb-12 pb-12 border-b-2 border-gray-50">
                    <div class="flex-1 relative">
                        <label class="doc-subtitle block mb-2">Invoice To</label>
                        <input type="text" id="customerName" placeholder="Start typing name..." class="w-full text-2xl font-black border-none bg-transparent outline-none" oninput="showCustomerMemories(this.value)" autocomplete="off">
                        <div id="customer-memories" class="hidden absolute left-0 right-0 rounded-lg overflow-hidden"></div>
                        <div id="addr-container" class="mt-3">
                            <textarea id="customerAddress" placeholder="Address..." class="w-full border-none p-0 focus:ring-0 bg-transparent outline-none resize-none" rows="3"></textarea>
                        </div>
                    </div>
                    <div class="md:text-right">
                        <label class="doc-subtitle block mb-2">Invoice From</label>
                        <p class="text-2xl font-black">EmmaFloAir</p>
                        <p class="text-lg text-gray-500 font-bold">Paul Harris</p>
                    </div>
                </div>

                <table id="main-table" class="w-full responsive-table mb-8"> 
                    <thead>
                        <tr class="border-b-2 border-gray-900 text-left doc-subtitle">
                            <th class="pb-4 col-date">Start</th>
                            <th class="pb-4 col-date">End</th>
                            <th class="pb-4 col-desc">Description</th>
                            <th class="pb-4 col-small text-right">Hrs</th>
                            <th class="pb-4 col-small text-right">Rate</th>
                            <th class="pb-4 col-total text-right">Total</th>
                            <th class="pb-4 w-8 no-print"></th>
                        </tr>
                    </thead>
                    <tbody id="lineItems"></tbody>
                </table>

                <button onclick="addItem()" class="no-print text-blue-600 font-black mb-12 flex items-center">
                    <i data-lucide="plus-circle" class="w-5 h-5 mr-2"></i> ADD LINE
                </button>

                <div class="flex flex-col md:flex-row justify-between pt-12 border-t-4 border-gray-900 gap-12">
                    <div class="flex-1 notes-container">
                        <label class="doc-subtitle block mb-2">Notes & Terms</label>
                        <textarea id="notes" class="w-full p-4 bg-gray-50 border-none rounded-xl italic" rows="2"></textarea>
                        <p class="text-[10px] font-black text-blue-600 mt-4 uppercase tracking-widest">Payment due within 30 days</p>
                        <div class="mt-4 flex items-center space-x-2 no-print">
                            <input type="checkbox" id="vatCheckbox" onchange="calculateTotal()">
                            <label class="text-sm font-bold">Apply 20% VAT</label>
                        </div>
                    </div>
                    <div class="w-full md:w-64 space-y-3">
                        <div class="flex justify-between text-xs font-bold text-gray-400 uppercase">
                            <span>Subtotal</span> <span id="subtotalDisplay">£0.00</span>
                        </div>
                        <div id="vatRow" class="hidden flex justify-between text-xs font-bold text-gray-400 uppercase">
                            <span>VAT (20%)</span> <span id="vatDisplay">£0.00</span>
                        </div>
                        <div class="flex justify-between items-center p-5 bg-black text-white rounded-2xl">
                            <span class="text-xs font-black">TOTAL</span>
                            <span id="totalAmount" class="text-2xl font-black">£0.00</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
